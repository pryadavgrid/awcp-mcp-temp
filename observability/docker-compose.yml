# AWCP Observability Stack
# Runs: OTel Collector → Prometheus + Tempo + Loki → Grafana
#
# Start: docker compose -f observability/docker-compose.yml up -d
# Stop:  docker compose -f observability/docker-compose.yml down
# Logs:  docker compose -f observability/docker-compose.yml logs -f

version: "3.8"

networks:
  awcp-obs:
    driver: bridge

volumes:
  prometheus_data: {}
  tempo_data: {}
  loki_data: {}
  grafana_data: {}
  lmnr_postgres_data: {}
  lmnr_clickhouse_data: {}
  lmnr_clickhouse_logs: {}
  lmnr_quickwit_data: {}
  postgres_data: {}

services:

  # ══════════════════════════════════════════
  # AWCP Postgres — canonical control-plane DB (registry / governance / evidence
  # / ops schema). Bootstrapped from ./init-db on a brand-new volume; this is the
  # same schema defined in files/observability and is the durable home for the
  # registry (registry.agents) instead of the local JSON file. Connect from the
  # host: postgresql+psycopg://awcp:awcppassword@localhost:5432/awcp
  # ══════════════════════════════════════════
  postgres:
    image: postgres:16
    container_name: awcp-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-awcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-awcppassword}
      POSTGRES_DB: ${POSTGRES_DB:-awcp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-awcp}", "-d", "${POSTGRES_DB:-awcp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - awcp-obs

  # ══════════════════════════════════════════
  # OPA — Open Policy Agent (the write-action gate's Policy Decision Point)
  # The magazine names OPA as the engine behind "Gate Write Actions" (Step 03) and
  # the Approval Gate Controller ("Temporal + OPA"). The radar (radar/opa.py) POSTs
  # each action's context to data.awcp.gate and enforces the verdict; policies live
  # in ../policies (gate.rego). Decision API → http://localhost:8181
  #
  # Enable enforcement from the radar by pointing it here (shadow mode first):
  #   AWCP_OPA_URL=http://localhost:8181 AWCP_OPA_SHADOW=true bash scripts/run_everything.sh
  # ══════════════════════════════════════════
  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: awcp-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ../policies:/policies:ro
    ports:
      - "8181:8181" # OPA Decision/Data API → http://localhost:8181
    networks:
      - awcp-obs

  # ══════════════════════════════════════════
  # OTel Collector — receives from Python apps
  # ══════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: awcp-otel-collector
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC  ← your Python apps send here
      - "4318:4318" # OTLP HTTP  ← alternative
      - "8888:8888" # Collector's own Prometheus metrics
      - "8889:8889" # Prometheus exporter (metrics from your app)
    networks:
      - awcp-obs
    depends_on:
      - tempo
      - loki
      - prometheus

  # ══════════════════════════════════════════
  # Prometheus — metrics storage
  # ══════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: awcp-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # Prometheus UI → http://localhost:9090
    networks:
      - awcp-obs

  # ══════════════════════════════════════════
  # Tempo — distributed traces storage
  # ══════════════════════════════════════════
  tempo:
    image: grafana/tempo:2.4.1
    container_name: awcp-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP API
      - "4317" # OTLP gRPC (internal, used by collector)
    networks:
      - awcp-obs

  # ══════════════════════════════════════════
  # Loki — logs storage
  # ══════════════════════════════════════════
  loki:
    image: grafana/loki:2.9.7
    container_name: awcp-loki
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100" # Loki HTTP API
    networks:
      - awcp-obs

  # ══════════════════════════════════════════
  # Grafana — dashboards & visualization
  # ══════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: awcp-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=awcp1234
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000" # Grafana UI → http://localhost:3000
    networks:
      - awcp-obs
    depends_on:
      - prometheus
      - tempo
      - loki

  # ══════════════════════════════════════════
  # Laminar — self-hosted LLM observability UI
  # Web UI  → http://localhost:5667
  # OTLP gRPC (for awcp.laminar exporter) → localhost:8881
  #
  # First run: visit :5667, create an account + project, copy the API key.
  # Then restart with LMNR_PROJECT_API_KEY=<key> to stream spans here.
  #
  # All env vars are configurable via LMNR_* overrides; defaults work
  # for local dev out of the box (no .env file needed).
  # ══════════════════════════════════════════

  lmnr-postgres:
    image: postgres:16
    container_name: lmnr-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - lmnr_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${LMNR_PG_USER:-lmnr}
      POSTGRES_PASSWORD: ${LMNR_PG_PASSWORD:-lmnrpassword}
      POSTGRES_DB: ${LMNR_PG_DB:-lmnr}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${LMNR_PG_USER:-lmnr}", "-d", "${LMNR_PG_DB:-lmnr}"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - awcp-obs

  lmnr-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: lmnr-clickhouse
    restart: unless-stopped
    volumes:
      - lmnr_clickhouse_data:/var/lib/clickhouse/
      - lmnr_clickhouse_logs:/var/log/clickhouse-server/
      - ./clickhouse-profiles-config.xml:/etc/clickhouse-server/users.d/lmnr.xml:ro
    environment:
      CLICKHOUSE_USER: ${LMNR_CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${LMNR_CH_PASSWORD:-lmnrchpassword}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - awcp-obs

  lmnr-quickwit:
    image: quickwit/quickwit:v0.8.2
    container_name: lmnr-quickwit
    restart: unless-stopped
    ports:
      - "7280:7280"
      - "7281:7281"
    environment:
      QW_DATA_DIR: /quickwit/qwdata
    command: ["run"]
    volumes:
      - lmnr_quickwit_data:/quickwit/qwdata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7280/health/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - awcp-obs

  lmnr-query-engine:
    image: ghcr.io/lmnr-ai/query-engine
    container_name: lmnr-query-engine
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8903:8903"
    environment:
      PORT: 8903
    healthcheck:
      test: ["CMD", "sleep", "5"]
      interval: 10s
      timeout: 6s
      retries: 3
    networks:
      - awcp-obs

  lmnr-app-server:
    image: ghcr.io/lmnr-ai/app-server
    container_name: lmnr-app-server
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8880:8000"   # HTTP API
      - "8881:8001"   # gRPC — point LMNR_OTLP_ENDPOINT=http://localhost:8881
      - "8882:8002"   # real-time
    depends_on:
      lmnr-postgres:
        condition: service_healthy
      lmnr-clickhouse:
        condition: service_started
      lmnr-quickwit:
        condition: service_healthy
      lmnr-query-engine:
        condition: service_healthy
    environment:
      PORT: 8000
      GRPC_PORT: 8001
      DATABASE_URL: postgres://${LMNR_PG_USER:-lmnr}:${LMNR_PG_PASSWORD:-lmnrpassword}@lmnr-postgres:5432/${LMNR_PG_DB:-lmnr}
      SHARED_SECRET_TOKEN: ${LMNR_SHARED_SECRET:-awcp-laminar-shared-secret}
      CLICKHOUSE_URL: http://lmnr-clickhouse:8123
      CLICKHOUSE_USER: ${LMNR_CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${LMNR_CH_PASSWORD:-lmnrchpassword}
      CLICKHOUSE_RO_USER: ${LMNR_CH_RO_USER:-default}
      CLICKHOUSE_RO_PASSWORD: ${LMNR_CH_RO_PASSWORD:-lmnrchpassword}
      ENVIRONMENT: LITE
      AEAD_SECRET_KEY: ${LMNR_AEAD_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      QUERY_ENGINE_URL: http://lmnr-query-engine:8903
      QUICKWIT_SEARCH_URL: http://lmnr-quickwit:7280
      QUICKWIT_INGEST_URL: http://lmnr-quickwit:7281
      QUICKWIT_SPANS_INDEX_ID: spans_v2
    networks:
      - awcp-obs

  lmnr-frontend:
    image: ghcr.io/lmnr-ai/frontend
    container_name: lmnr-frontend
    pull_policy: always
    restart: unless-stopped
    ports:
      - "5667:5667"   # Laminar Web UI → http://localhost:5667
    depends_on:
      lmnr-postgres:
        condition: service_healthy
      lmnr-quickwit:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${LMNR_PG_USER:-lmnr}:${LMNR_PG_PASSWORD:-lmnrpassword}@lmnr-postgres:5432/${LMNR_PG_DB:-lmnr}
      PORT: 5667
      BACKEND_URL: http://lmnr-app-server:8000
      BACKEND_RT_URL: http://lmnr-app-server:8002
      SHARED_SECRET_TOKEN: ${LMNR_SHARED_SECRET:-awcp-laminar-shared-secret}
      NEXTAUTH_URL: http://localhost:5667
      NEXTAUTH_SECRET: ${LMNR_NEXTAUTH_SECRET:-some_secret}
      NEXT_PUBLIC_URL: http://localhost:5667
      ENVIRONMENT: LITE
      CLICKHOUSE_URL: http://lmnr-clickhouse:8123
      CLICKHOUSE_USER: ${LMNR_CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${LMNR_CH_PASSWORD:-lmnrchpassword}
      CLICKHOUSE_RO_USER: ${LMNR_CH_RO_USER:-default}
      CLICKHOUSE_RO_PASSWORD: ${LMNR_CH_RO_PASSWORD:-lmnrchpassword}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AEAD_SECRET_KEY: ${LMNR_AEAD_SECRET_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      QUICKWIT_SEARCH_URL: http://lmnr-quickwit:7280
      LLM_PROVIDER: ${LMNR_LLM_PROVIDER:-}
      LLM_BASE_URL: ${LMNR_LLM_BASE_URL:-}
      LLM_API_KEY: ${LMNR_LLM_API_KEY:-}
      LLM_MODEL_SMALL: ${LMNR_LLM_MODEL_SMALL:-}
      LLM_MODEL_MEDIUM: ${LMNR_LLM_MODEL_MEDIUM:-}
      LLM_MODEL_LARGE: ${LMNR_LLM_MODEL_LARGE:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    networks:
      - awcp-obs
